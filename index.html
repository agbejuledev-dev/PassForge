<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassForge — Password Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="tag">Security Tool</div>
    <h1>PassForge</h1>
  </div>

  <!-- Main card -->
  <div class="card">

    <!-- Password output -->
    <div class="output-section">
      <div class="output-label">Generated Password</div>
      <div class="password-display" id="passwordDisplay">Click generate...</div>

      <!-- Strength -->
      <div class="strength-section">
        <div class="strength-bar-track">
          <div class="strength-bar-fill" id="strengthBar"></div>
        </div>
        <div class="strength-label" id="strengthLabel">—</div>
      </div>

      <!-- Entropy -->
      <div class="entropy-row">
        <span class="entropy-label">Entropy:</span>
        <span class="entropy-val" id="entropyVal">—</span>
        <span class="entropy-label">bits</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="action-row" style="margin-bottom:24px;">
      <button class="btn-copy" id="copyBtn" onclick="copyPassword()">
        <span id="copyIcon">⎘</span>
        <span id="copyText">Copy Password</span>
      </button>
      <button class="btn-icon" title="Refresh" onclick="generatePassword()">↺</button>
      <button class="btn-icon" title="Toggle history" onclick="toggleHistory()">◷</button>
    </div>

    <!-- Settings -->
    <div class="settings">

      <!-- Length -->
      <div class="setting-row">
        <div class="setting-row-header">
          <span class="setting-label">Password Length</span>
          <span class="length-val" id="lengthVal">16</span>
        </div>
        <input type="range" id="lengthSlider" min="6" max="64" value="16"
          oninput="onLengthChange(this.value)">
      </div>

      <div class="divider"></div>

      <!-- Character type toggles -->
      <div>
        <div class="setting-label" style="margin-bottom:10px;">Character Types</div>
        <div class="toggles-grid">
          <div class="toggle-item active" id="toggle-upper" onclick="toggleOption('upper')">
            <div class="toggle-info">
              <div class="toggle-icon">🔠</div>
              <div class="toggle-text">
                <div class="toggle-name">Uppercase</div>
                <div class="toggle-desc">A–Z</div>
              </div>
            </div>
            <div class="toggle-switch"></div>
          </div>
          <div class="toggle-item active" id="toggle-lower" onclick="toggleOption('lower')">
            <div class="toggle-info">
              <div class="toggle-icon">🔡</div>
              <div class="toggle-text">
                <div class="toggle-name">Lowercase</div>
                <div class="toggle-desc">a–z</div>
              </div>
            </div>
            <div class="toggle-switch"></div>
          </div>
          <div class="toggle-item active" id="toggle-numbers" onclick="toggleOption('numbers')">
            <div class="toggle-info">
              <div class="toggle-icon">🔢</div>
              <div class="toggle-text">
                <div class="toggle-name">Numbers</div>
                <div class="toggle-desc">0–9</div>
              </div>
            </div>
            <div class="toggle-switch"></div>
          </div>
          <div class="toggle-item active" id="toggle-symbols" onclick="toggleOption('symbols')">
            <div class="toggle-info">
              <div class="toggle-icon">✦</div>
              <div class="toggle-text">
                <div class="toggle-name">Symbols</div>
                <div class="toggle-desc">!@#$%...</div>
              </div>
            </div>
            <div class="toggle-switch"></div>
          </div>
        </div>
      </div>

      <!-- Exclude chars -->
      <div class="exclude-row">
        <div class="setting-label">Exclude Characters</div>
        <input type="text" class="exclude-input" id="excludeInput"
          placeholder="e.g. 0O1lI (ambiguous chars)"
          oninput="generatePassword()">
      </div>

    </div>

    <!-- Generate -->
    <button class="btn-generate" onclick="generatePassword()" style="margin-top:20px;">
      ⚡ Generate Password
    </button>

  </div>

  <!-- History -->
  <div class="history-section" id="historySection">
    <div class="section-title">History</div>
    <div class="history-list" id="historyList">
      <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);padding:8px 0;">
        No history yet. Generate some passwords!
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">Copied!</div>

<script src="JS/script.js"></script></body>
</html>
